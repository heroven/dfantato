backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Adiciona "{{slug}}"'
    update: 'Atualiza "{{slug}}"'
    delete: 'Remove "{{slug}}"'
    uploadMedia: 'Adiciona imagem {{path}}'
    deleteMedia: 'Remove imagem {{path}}'

locale: 'pt'

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: "https://dfantato.com.br"
display_url: "https://dfantato.com.br"
logo_url: "/images/logo-gold.png"

collections:
  - name: "pecas"
    label: "Peças"
    label_singular: "Peça"
    folder: "pecas"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titulo}} — {{categoria}}{{#if vendida}} (Vendida){{/if}}{{#if destaque}} ⭐{{/if}}"
    sortable_fields: ['ordem_destaque', 'titulo', 'categoria']
    view_filters:
      - label: "Apenas em destaque"
        field: destaque
        pattern: true
      - label: "Apenas vendidas"
        field: vendida
        pattern: true
      - label: "Apenas disponíveis"
        field: vendida
        pattern: false
    fields:
      - {label: "Foto da Peça", name: "foto", widget: "image", required: true, hint: "JPG ou PNG. Idealmente vertical, alta qualidade."}
      - {label: "Nome da Peça", name: "titulo", widget: "string", required: true, hint: "Ex: Bowl Raízes, Cavalo Solitário"}
      - label: "Categoria"
        name: "categoria"
        widget: "select"
        required: true
        options:
          - "Esculturas"
          - "Obras Decorativas"
          - "Bowls e Travessas"
          - "Tábuas e Acessórios"
        hint: "Para criar nova categoria, edite na aba 'Configurações'"
      - {label: "Tipo de Madeira", name: "tipo_madeira", widget: "string", required: false, hint: "Ex: Imbuia recuperada, Cedro nativo"}
      - {label: "Descrição", name: "descricao", widget: "text", required: false, hint: "Texto que aparece quando o cliente clica na peça. Pode contar a história da madeira."}
      - {label: "Preço (R$)", name: "preco", widget: "number", required: false, value_type: "float", min: 0, hint: "Deixe vazio se preferir 'sob consulta'"}
      - {label: "★ Em Destaque", name: "destaque", widget: "boolean", default: false, hint: "Aparece primeiro no site, com selo dourado"}
      - {label: "Ordem do Destaque", name: "ordem_destaque", widget: "number", required: false, default: 0, hint: "Quanto MENOR o número, mais à frente aparece. Use 1, 2, 3..."}
      - {label: "Vendida", name: "vendida", widget: "boolean", default: false, hint: "Quando vendida, aparece com selo 'Vendida' e some o botão de WhatsApp"}

  - name: "jatamala"
    label: "Jatamala — Peças"
    label_singular: "Peça Jatamala"
    folder: "jatamala"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{titulo}}{{#if vendida}} (Vendida){{/if}}"
    fields:
      - {label: "Foto da Peça", name: "foto", widget: "image", required: true}
      - {label: "Nome da Peça", name: "titulo", widget: "string", required: true}
      - {label: "Tipo de Madeira", name: "tipo_madeira", widget: "string", required: false}
      - {label: "Descrição", name: "descricao", widget: "text", required: false}
      - {label: "Preço (R$)", name: "preco", widget: "number", required: false, value_type: "float", min: 0}
      - {label: "Vendida", name: "vendida", widget: "boolean", default: false}

  - name: "config"
    label: "Configurações Gerais"
    files:
      - name: "site"
        label: "Site e Contato"
        file: "_data/site.yml"
        fields:
          - {label: "Número WhatsApp (com DDD)", name: "whatsapp_numero", widget: "string", required: true, pattern: ['^\d+$', 'Apenas números, ex: 5548988746307'], hint: "Sem espaços, parênteses ou traços. Formato: 55 + DDD + número"}
          - {label: "Link Instagram", name: "instagram_url", widget: "string", required: false}
          - {label: "Cidade", name: "cidade", widget: "string", required: false}
          - {label: "Mensagem de Interesse no WhatsApp", name: "mensagem_whatsapp", widget: "string", default: "Olá! Tenho interesse na peça *{nome}*. Poderia me passar mais informações?", hint: "Use {nome} para inserir o nome da peça automaticamente"}
